name: Selenium E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm ci

    - name: Build the app
      run: npm run build

    - name: Start Vite Preview Server
      run: |
        npm run preview &
        echo $! > server.pid

    - name: Wait for server
      run: |
        npx wait-on http://localhost:4173/GigPath/ -t 30000

    - name: Run Selenium Tests
      run: npm run test:e2e
      env:
        BASE_URL: http://127.0.0.1:4173/GigPath/

    - name: Upload Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: selenium-reports
        path: reports/

    - name: Stop Server
      if: always()
      run: kill $(cat server.pid)